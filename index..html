<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة المراجعة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#f5f5f5;color:#222;direction:rtl;font-size:14px}
  .container{max-width:900px;margin:0 auto;padding:16px}
  h1{text-align:center;font-size:20px;font-weight:700;margin-bottom:16px;color:#1a1a1a}
  .header-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap}
  .field{flex:1;min-width:200px}
  .field label{font-size:13px;color:#666;display:block;margin-bottom:5px;font-weight:500}
  .field select{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:7px;font-size:14px;background:#fff;color:#222;-webkit-appearance:none;appearance:none;cursor:pointer;direction:rtl}
  .field select:focus{outline:none;border-color:#1D9E75}
  .table-wrap{background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:#1D9E75;color:#fff}
  th{padding:10px 8px;text-align:center;font-weight:600;font-size:13px}
  th.col-bayan{text-align:right;padding-right:12px}
  th.col-note{text-align:right;padding-right:8px}
  td{padding:8px 6px;border-bottom:1px solid #eee;vertical-align:middle;text-align:center}
  td.col-bayan{text-align:right;padding-right:12px;line-height:1.6;color:#222}
  td.col-note{text-align:right}
  tr:last-child td{border-bottom:none}
  tr:nth-child(even){background:#f9f9f9}
  tr:hover{background:#f0faf5}
  .num{font-size:12px;color:#888;font-weight:600}
  input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#1D9E75}
  textarea.note{width:100%;border:1px solid #ddd;border-radius:6px;padding:5px 7px;font-size:12px;resize:vertical;background:#fff;color:#222;font-family:Arial,sans-serif;min-height:50px;direction:rtl}
  textarea.note:focus{outline:none;border-color:#1D9E75}
  .actions{display:flex;gap:12px;margin-top:4px}
  .btn{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;border:none;transition:opacity .15s}
  .btn:active{opacity:.85;transform:scale(0.98)}
  .btn-primary{background:#1D9E75;color:#fff}
  .btn-secondary{background:#fff;color:#444;border:1px solid #ccc}
  @media(max-width:600px){
    .header-card{flex-direction:column;gap:10px}
    table{font-size:12px}
    th,td{padding:7px 4px}
    td.col-bayan,th.col-bayan{padding-right:8px}
    .btn{font-size:13px;padding:11px}
  }
  @media print{
    body{background:#fff}
    .actions{display:none}
    .container{padding:8px}
    tr:hover{background:inherit}
    textarea.note{border:none;resize:none}
  }
</style>
</head>
<body>
<div class="container">
  <h1>قائمة المراجعة</h1>

  <div class="header-card">
    <div class="field">
      <label>مدير المنطقة</label>
      <select id="manager">
        <option value="">— اختر مدير المنطقة —</option>
        <option>خالد شعبان</option>
        <option>اسلام فاروق</option>
        <option>عبدالعزيز رافت</option>
      </select>
    </div>
    <div class="field">
      <label>الفرع</label>
      <select id="branch">
        <option value="">— اختر الفرع —</option>
        <option>الحصرى</option>
        <option>فيصل</option>
        <option>مول العرب</option>
        <option>الرحاب</option>
        <option>الشيراتون</option>
        <option>المعادى</option>
        <option>القبة</option>
        <option>سيتى ستارز</option>
        <option>عباس العقاد</option>
        <option>الاهرام</option>
        <option>الف مسكن</option>
        <option>السلام</option>
        <option>سفير</option>
        <option>التجمع الخامس</option>
        <option>وسط البلد</option>
      </select>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px">#</th>
          <th class="col-bayan">البيان</th>
          <th style="width:50px">نعم</th>
          <th style="width:50px">لا</th>
          <th class="col-note" style="width:200px">ملاحظات</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="exportPDF()">&#x1F4C4; تصدير PDF</button>
    <button class="btn btn-secondary" onclick="resetForm()">&#x21BA; مسح الكل</button>
  </div>
</div>

<script>
const items = [
  "هل المنطقة الخارجية نظيفة وبحاله جيدة",
  "هل الكشافات والاضاءة الخارجية جيدة ولاتوجد اعطال بها",
  "هل ابواب المطعم نظيفة وبحاله جيدة",
  "هل منطقة الكاونتر نظيفة ومرتبه",
  "هل منطقة الصاله نظيفة ودرجة الحرارة مناسبة والموسيقى تعمل ( الصوت مناسب )",
  "هل مواد الدعايه فى حاله جيده وفى مكانها المحدد",
  "هل حوائط وارضيات الصاله نظيفه",
  "هل التكييفات وفتحات التكييفات نظيفه وتعمل بكفاءة",
  "هل درجة حرارة التكييفات تم ضبطها على 24",
  "هل الطاولات والكراسى نظيفه وبحاله جيده",
  "هل الحمامات نظيفه وبحاله جيده ويوجد بها صابون ومناديل",
  "هل تتم تحيه العميل مع الابتسامه من الكاشير",
  "هل الكاونتر مرتب ونظيف",
  "هل المنيو بورد نظيف ومحدث",
  "هل الزى الرسمى نظيف ومهندم",
  "هل النظافة الشخصية للموظفين جيده ( الاظافر - الذقن - الشعر )",
  "سرعة الخدمه لطلبات الصاله والثيك اواى لاتتخطى ال 5 دقائق",
  "هل زمن تجهيز طلبات خدمه التوصيل للمنازل لاتتعدى 10 دقائق للطلب الواحد",
  "هل يوجد دسباتشر فى الورديه",
  "هل يتم توزيع المهام على الموظفين ( رئيسيه وثانويه )",
  "هل جدول العماله متوافر",
  "هل جدول توقع الايرادات والمنتجات متوافر ومفعل",
  "هل مظهر منتجات الدجاج مطابقه للمعايير",
  "هل مذاق منتجات الدجاج مطابقه للمعايير",
  "هل المنتجات الباردة فى درجة الحرارة الصحيحه 34 ف الى 41 ف",
  "هل المنتجات الساخنه فى درجة الحرارة الصحيحه اعلى من 140 ف",
  "هل جميع المنتجات المجهزه لها زمن حفظ ولايوجد منتج تخطى زمن الحفظ",
  "هل جميع المنتجات داخل تاريخ الصلاحيه",
  "هل معدات حفظ الاطعمة الباردة فى درجة الحرارة الصحيحه",
  "هل معدات حفظ الاطعمة الساخنه فى درجة الحرارة الصحيحه",
  "هل السانوتشات يتم تجهيزها طبقا للمعايير",
  "هل اجراءات البريدنج والنخل تتم بطريقه صحيحه",
  "هل اجراءات الرص تتم بصوره صحيحه",
  "هل اجراءات ادارة الشورتننج تتم طبقا للمعايير ( التسخين الصباحى - الفاتره - مستوى الشورتننج - الشفافيه )",
  "هل الاصناف الجانبيه مخزنه بطريقه صحيحه ويتم طهيها طبقا للمعايير",
  "هل الفرايز يتم تمليحها",
  "هل معدات الحفظ الباردة نظيفه وبحاله جيده",
  "هل معدات الحفظ الساخنه نظيفه وبحاله جيده",
  "هل معدات الطهى نظيفه وبحاله جيده",
  "هل التوستر نظيف وبحاله جيده",
  "هل ارضيات وحوائط وسقف المطبخ نظيفه وبحاله جيده",
  "هل يوجد فتحات او ثقوب فى سقف او حوائط المطبخ تؤدى الى دخول الحشرات",
  "هل حوض غسيل الايدى متاح ويستخدم لغسيل الايدى فقط",
  "هل ادوات التشغيل نظيفه وبحاله جيده",
  "هل المخزن مرتب ونظيف",
  "هل المكان المخصص للموظفين وحمام الموظفين نظيف وبحاله جيده",
  "هل اجراءات غسيل الايدى صحيحه",
  "هل حالات غسيل الايدى يتم اتباعها",
  "هل توجد شنطه اسعافات اوليه بالمطعم وكامله",
  "هل تعبئة الطلبات تتم طبقا للمعايير",
  "لاتوجد اى مخاطر بالمطعم ( اسلاك مكشوفه - ارضيات مبلله - اجزاء حاده .........)",
  "هل مدير الورديه يقوم بتوجيه ودعم ومتابعه الموظفين والعملاء",
  "هل نظام التدريب مفعل وجميع الاوراق الخاصه به موجوده",
  "هل يتم عمل onboarding للموظفين",
  "هل جداول التدريب موجوده ومفعله",
  "هل خطه التدريب CTNA موجوده ومفعله",
  "هل يوجد RTS بالمطعم",
  "هل امتحانات الموظفين مفعله",
  "هل RC موجوده والموظف على علم بها",
  "هل خطه التطوير موجوده",
  "هل كتاب معايير التشغيل موجود",
  "قم بعمل اختبار عملى سريع لعدد 2 موظفين",
  "هل ال BP متوافر والموظفين على علم به",
  "هل تم عمل اجتماع يومى فى بدايه كل ورديه لمعرفه الاهداف",
  "هل يتم عمل اجتماع شهرى مع الاداريين لمناقشة النتائج والاهداف",
  "هل برنامج التقدير والتحفيز مفعل",
  "هل ملف الموظف موجود ومفعل",
  "هل الاحداث الايجابيه والسلبيه لكل موظف موجوده",
  "هل الموظفين على علم بال VISION AND MISSION",
  "هل الموظفين على علم بال Core values",
  "هل نسبه التدريب للموظفين Expert %25",
  "هل الدسباتشر مدرب",
  "هل مدير الفريق مدرب ويقوم بتنفيذ الخطط التدريبيه"
];

function buildTable(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  items.forEach((text, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="num">${i+1}</td>
      <td class="col-bayan">${text}</td>
      <td><input type="checkbox" onchange="syncCheck(this,${i},'yes')"></td>
      <td><input type="checkbox" onchange="syncCheck(this,${i},'no')"></td>
      <td class="col-note"><textarea class="note" rows="1" placeholder="..."></textarea></td>
    `;
    tb.appendChild(tr);
  });
}

function syncCheck(el, row, type){
  const tds = document.querySelectorAll('#tbody tr')[row].querySelectorAll('td');
  if(el.checked){
    if(type==='yes') tds[3].querySelector('input').checked = false;
    else tds[2].querySelector('input').checked = false;
  }
}

function resetForm(){
  document.getElementById('manager').value = '';
  document.getElementById('branch').value = '';
  buildTable();
}

function exportPDF(){
  const { jsPDF } = window.jspdf;
  const manager = document.getElementById('manager').value || '—';
  const branch = document.getElementById('branch').value || '—';
  const now = new Date().toLocaleDateString('ar-EG');

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  // Header info
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(29, 158, 117);
  doc.text('checklist / قائمة المراجعة', 105, 15, { align: 'center' });

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(60, 60, 60);
  doc.text(`Manager: ${manager}`, 14, 24);
  doc.text(`Branch: ${branch}`, 14, 30);
  doc.text(`Date: ${now}`, 14, 36);

  // Collect rows
  const tableRows = [];
  document.querySelectorAll('#tbody tr').forEach((tr, i) => {
    const tds = tr.querySelectorAll('td');
    const yes = tds[2].querySelector('input').checked;
    const no  = tds[3].querySelector('input').checked;
    const note = tds[4].querySelector('textarea').value;
    tableRows.push([
      String(i + 1),
      items[i],
      yes ? '✓' : '',
      no  ? '✗' : '',
      note
    ]);
  });

  doc.autoTable({
    startY: 42,
    head: [['#', 'البيان', 'نعم', 'لا', 'ملاحظات']],
    body: tableRows,
    styles: { font: 'helvetica', fontSize: 9, cellPadding: 3, halign: 'center', overflow: 'linebreak' },
    columnStyles: {
      0: { cellWidth: 10, halign: 'center' },
      1: { cellWidth: 90, halign: 'right' },
      2: { cellWidth: 14, halign: 'center', textColor: [0, 140, 80], fontStyle: 'bold' },
      3: { cellWidth: 14, halign: 'center', textColor: [200, 40, 40], fontStyle: 'bold' },
      4: { cellWidth: 55, halign: 'right' }
    },
    headStyles: { fillColor: [29, 158, 117], textColor: 255, fontStyle: 'bold', fontSize: 10 },
    alternateRowStyles: { fillColor: [245, 250, 248] },
    margin: { left: 14, right: 14 },
    tableWidth: 'auto'
  });

  const filename = `checklist_${branch || 'report'}_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(filename);
}

buildTable();
</script>
</body>
</html>
